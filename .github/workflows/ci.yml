name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:

jobs:
  ci-fast-python:
    name: ci-fast / python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Create virtualenv
        run: uv venv .venv --python 3.11
      - name: Install Python test deps
        run: uv pip install --python .venv/bin/python -r config/requirements-dev.txt
      - name: Run unit and contract tests
        run: >
          .venv/bin/python -m pytest
          test/test_agent_runtime_state.py
          test/test_openai_protocol.py
          test/test_configure_openclaw_sync.py
          test/test_team_creator_jobs.py
          test/test_team_creator_workflow.py
          test/test_team_creator_zip.py
          test/test_tinyfish_monitor.py
          -q

  ci-fast-node:
    name: ci-fast / node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Node deps
        run: npm ci
      - name: Run frontend pure logic tests
        run: npm run test:node

  ci-smoke-python:
    name: ci-smoke / python
    runs-on: ubuntu-latest
    needs:
      - ci-fast-python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Create virtualenv
        run: uv venv .venv --python 3.11
      - name: Install Python test deps
        run: uv pip install --python .venv/bin/python -r config/requirements-dev.txt
      - name: Run repeatable integration smoke tests
        run: >
          .venv/bin/python -m pytest
          test/test_integration.py
          test/test_proxy_login_i18n.py
          -q

  ci-smoke-browser:
    name: ci-smoke / browser
    runs-on: ubuntu-latest
    needs:
      - ci-fast-python
      - ci-fast-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Create virtualenv
        run: uv venv .venv --python 3.11
      - name: Install Python test deps
        run: uv pip install --python .venv/bin/python -r config/requirements-dev.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Node deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Studio browser smoke
        env:
          CLAWCROSS_TEST_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: npm run test:browser-smoke
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
