<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Large agent (back) -->
  <g fill="#4CAF50">
    <!-- Left ear -->
    <rect x="14" y="18" width="12" height="12"/>
    <!-- Right ear -->
    <rect x="36" y="18" width="18" height="12"/>
    <!-- Body -->
    <rect x="10" y="28" width="48" height="30"/>
    <!-- Legs -->
    <rect x="14" y="58" width="8" height="10"/>
    <rect x="26" y="58" width="8" height="10"/>
    <rect x="38" y="58" width="8" height="10"/>
    <rect x="50" y="58" width="8" height="10"/>
  </g>
  <!-- Large agent eyes -->
  <rect x="20" y="34" width="5" height="10" fill="#fff"/>
  <rect x="36" y="34" width="5" height="10" fill="#fff"/>

  <!-- Small agent (front) -->
  <g fill="#2E7D32">
    <!-- Left ear -->
    <rect x="54" y="40" width="10" height="10"/>
    <!-- Right ear -->
    <rect x="72" y="40" width="14" height="10"/>
    <!-- Body -->
    <rect x="50" y="48" width="40" height="22"/>
    <!-- Legs -->
    <rect x="54" y="70" width="6" height="8"/>
    <rect x="64" y="70" width="6" height="8"/>
    <rect x="74" y="70" width="6" height="8"/>
    <rect x="84" y="70" width="6" height="8"/>
  </g>
  <!-- Small agent eyes -->
  <rect x="58" y="54" width="4" height="8" fill="#fff"/>
  <rect x="72" y="54" width="4" height="8" fill="#fff"/>
</svg>
